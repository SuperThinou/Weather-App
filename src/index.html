<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my Weather App</title>
</head>

<body>
    <h1>my Weather App</h1>
    <div class="search-bar-container">
        <button id="searchBtn" class="icon"></button>
        <input type="search" id="searchBar" class="search-bar" placeholder="City name" />
    </div>
    <p class="error hidden"></p>

    <div id="loader" class="loader hidden"></div>
    <main>
        <div class="city-icon-container">
            <h2 class="city"></h2>
            <div class="weather-icon-container"><img src="#" class="weather-icon" alt=""></div>
        </div>
        <p class="conditions"></p>
        <h3 class="temp"></h3>

        <div class="weather-info-container">
            <div class="precip-container">
                <h4 class="precip-title">Rain</h4>
                <p class="precip"></p>
            </div>
            <div class="wind-container">
                <h4 class="wind-title">Wind</h4>
                <p class="wind"></p>
            </div>
            <div class="uv-container">
                <h4 class="uv-title">UV Index</h4>
                <p class="uv"></p>
            </div>

            <div class="time-container">
                <div class="sunrise-container">
                    <h4 class="sunrise-title">Sunrise</h4>
                    <p class="sunrise"></p>
                </div>
                <div class="current-time-container">
                    <h4 class="current-time-title">Current Time</h4>
                    <h5 class="current-time"></h5>
                </div>
                <div class="sunset-container">
                    <h4 class="sunset-title">Sunset</h4>
                    <p class="sunset"></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>NBX 2026 ©</p>
        <a href="https://github.com/SuperThinou" target="_blank" class="github-link"></a>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my Weather App</title>
</head>

<body>
    <h1>my Weather App</h1>
    <div class="search-bar-container">
        <button id="searchBtn" class="icon"></button>
        <input type="search" id="searchBar" class="search-bar" placeholder="Custom search" />
    </div>

    <main>
        <h2 class="city"></h2>
        <div class="weather-icon-container"><img src="#" class="weather-icon" alt=""></div>
        <p class="conditions"></p>
        <h3 class="temp"></h3>

        <p class="precip"></p>
        <p class="wind"></p>
        <p class="uv"></p>
        <p class="sunrise"></p>
        <p class="sunset"></p>
    </main>

    <footer>
        <p>NBX 2026 ©</p>
        <a href="https://github.com/SuperThinou" target="_blank" class="github-link"></a>
    </footer>
</body>

</html>
